<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LEVEL 16: The Shadow Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗝️</text></svg>">
</head>
<body>

<!-- Particle background -->
<canvas id="particles"></canvas>

<!-- Drifting fog, tinted per level -->
<div id="fog"></div>

<!-- Vignette / lighting overlay -->
<div id="vignette"></div>

<!-- ══════════ LOADING SCREEN ══════════ -->
<div id="screen-loading" class="screen active">
  <div class="loading-rune">◈</div>
  <div class="loading-title">THE SHADOW VAULT</div>
  <div class="loading-bar"><div class="loading-fill" id="loading-fill"></div></div>
  <div class="loading-tip" id="loading-tip">Sharpening rusty swords...</div>
</div>

<!-- ══════════ CUTSCENE / TITLE ══════════ -->
<div id="screen-cutscene" class="screen">
  <div class="cutscene-text" id="cutscene-text"></div>
</div>

<div id="screen-title" class="screen">
  <div class="title-glow"></div>
  <div class="game-logo">
    <div class="logo-level">LEVEL 16</div>
    <div class="logo-name">THE SHADOW VAULT</div>
    <div class="logo-rune">⚔ ◈ ⚔</div>
  </div>
  <div class="title-buttons">
    <button class="btn btn-primary" id="btn-start">PRESS START</button>
    <button class="btn btn-ghost hidden" id="btn-continue">CONTINUE</button>
    <button class="btn btn-ghost hidden" id="btn-newgame">NEW GAME</button>
  </div>
  <div class="title-footer">A quest awaits the chosen hero</div>
</div>

<!-- ══════════ HUD ══════════ -->
<div id="hud" class="hidden">
  <div class="hud-row">
    <div class="hud-stat" title="Hearts (this trial)">
      <div class="hearts-row" id="hearts-row"></div>
    </div>
    <div class="hud-stat"><span class="hud-ico">⭐</span><span class="hud-num" id="xp-num">0 XP</span><span class="hud-lvl" id="lvl-num">Lv.1</span></div>
  </div>
  <div class="hud-row">
    <div class="hud-stat hud-stage" id="hud-stage">Trial 1/8</div>
    <button class="hud-btn" id="btn-inventory" title="Inventory">👜<span class="inv-count" id="inv-count">0</span></button>
    <button class="hud-btn" id="btn-sound" title="Sound">🔊</button>
    <button class="hud-btn" id="btn-music" title="Music">🎵</button>
  </div>
</div>

<!-- ══════════ OVERWORLD MAP (walkable path) ══════════ -->
<div id="screen-map" class="screen">
  <h2 class="screen-heading">✦ THE FIRST DESCENT ✦</h2>
  <p class="map-sub">Cross the dunes. Eight trials stand between you and the Vault.</p>
  <div class="map-scroll" id="map-scroll">
    <div class="map-path" id="map-path">
      <svg class="map-path-svg" id="map-path-svg"></svg>
      <!-- gate nodes + hero token injected by JS -->
    </div>
  </div>
  <div class="map-controls">
    <button class="btn dpad-btn" id="btn-map-prev">◀ BACK</button>
    <button class="btn btn-primary hidden" id="btn-map-enter">ENTER GATE ▶</button>
    <button class="btn dpad-btn" id="btn-map-next">FORWARD ▶</button>
  </div>
</div>

<!-- ══════════ TRIAL (monster intro → puzzle → reward) ══════════ -->
<div id="screen-stage" class="screen">
  <div class="stage-header" id="stage-header"></div>

  <!-- intro dialogue phase -->
  <div class="monster-zone" id="monster-zone">
    <div class="monster-sprite" id="monster-sprite"></div>
    <div class="monster-name-plate">
      <div class="monster-name" id="monster-name"></div>
      <div class="monster-title" id="monster-title"></div>
    </div>
  </div>
  <div class="dialogue-box" id="dialogue-box">
    <div class="dialogue-text" id="dialogue-text"></div>
    <button class="btn btn-small" id="btn-dialogue-next">▼</button>
  </div>

  <!-- puzzle phase — one of five engines from js/puzzles.js mounts here -->
  <div class="puzzle-zone hidden" id="puzzle-zone">
    <div class="puzzle-hint">Solve the trial of <span id="puzzle-goal-name"></span></div>
    <div id="puzzle-mount"></div>
  </div>
</div>

<!-- ══════════ VICTORY OVERLAY ══════════ -->
<div id="overlay-victory" class="overlay hidden">
  <div class="victory-card">
    <div class="victory-burst">✦</div>
    <h2 class="victory-title">VICTORY!</h2>
    <div class="victory-monster" id="victory-monster"></div>
    <div class="loot-popup" id="loot-popup">
      <div class="loot-icon" id="loot-icon"></div>
      <div class="loot-name" id="loot-name"></div>
    </div>
    <div class="xp-gain" id="xp-gain"></div>
    <button class="btn btn-primary" id="btn-victory-continue">CONTINUE</button>
  </div>
</div>

<!-- ══════════ INVENTORY OVERLAY ══════════ -->
<div id="overlay-inventory" class="overlay hidden">
  <div class="inv-card">
    <h2 class="inv-title">👜 RELIC SATCHEL</h2>
    <div class="inv-grid" id="inv-grid"></div>
    <div class="inv-detail hidden" id="inv-detail"></div>
    <button class="btn btn-ghost" id="btn-inv-close">CLOSE</button>
  </div>
</div>

<!-- ══════════ VAULT ENDING ══════════ -->
<div id="screen-vault" class="screen">
  <div class="vault-scene" id="vault-scene">
    <div class="vault-door" id="vault-door">
      <div class="vault-ring"></div>
      <div class="vault-keyhole">◈</div>
    </div>
    <div class="vault-text" id="vault-text">The Birthday Vault...</div>
    <div class="chest-row hidden" id="chest-row"></div>
    <div class="vault-finale hidden" id="vault-finale"></div>
  </div>
</div>

<!-- ══════════ CREDITS ══════════ -->
<div id="screen-credits" class="screen">
  <div class="credits-scroll" id="credits-scroll"></div>
</div>

<!-- Floating toast notifications (achievements, level-ups) -->
<div id="toast-zone"></div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/save.js"></script>
<script src="js/hud.js"></script>
<script src="js/audio.js"></script>
<script src="js/puzzles.js"></script>
<script src="js/vault.js"></script>
<script src="js/game.js"></script>
</body>
</html>
